<!DOCTYPE html>
<html>
<head>
<title>NeuroLearn AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage">
<h1>Login</h1>
<input id="username" placeholder="Enter Username">
<input id="password" type="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
<p id="error"></p>
</div>

<!-- HOME -->
<div id="homePage" style="display:none;">
<h1>Welcome to NeuroLearn AI</h1>
<h3 id="welcomeUser"></h3>
<button onclick="startApp()">Start</button>
</div>

<!-- MAIN -->
<div id="mainPage" style="display:none;">

<h2>NeuroLearn AI</h2>
<p id="userDisplay"></p>

<!-- NAVIGATION -->
<div>
<button onclick="showSection('rec')">Recommendation</button>
<button onclick="showSection('analysis')">Analysis</button>
<button onclick="showSection('history')">History</button>
<button onclick="showSection('fav')">Favorites</button>
<button onclick="showSection('admin')">Admin</button>
<button onclick="logout()">Logout</button>
</div>

<br>

<!-- RECOMMENDATION -->
<div id="recSection">
<input id="sid" placeholder="Enter Student ID">

<select id="career">
<option value="">Select Career Role</option>
<option>Data Scientist</option>
<option>Web Developer</option>
<option>Data Analyst</option>
<option>AI Engineer</option>
<option>Software Engineer</option>
</select>

<button onclick="getRec()">Get Recommendation</button>

<div id="result"></div>
</div>

<!-- ANALYSIS -->
<div id="analysisSection" style="display:none;">
<h3>Skill Analysis</h3>
<canvas id="chart"></canvas>
</div>

<!-- HISTORY -->
<div id="historySection" style="display:none;">
<h3>History</h3>
<ul id="historyList"></ul>
</div>

<!-- FAVORITES -->
<div id="favSection" style="display:none;">
<h3>Favorites</h3>
<ul id="favList"></ul>
<button onclick="saveFavorite()"> Save Favorite</button>
</div>

<!-- ADMIN -->
<div id="adminSection" style="display:none;">
<h3>Admin Dashboard</h3>
<p>Total Users: 50</p>
<p>Top Career: Data Scientist</p>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
