<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroLearn AI</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

</head>

<body>

<div id="particles-js"></div>

<div class="login-wrapper">

<div class="left-panel">

<div class="logo-glow"></div>

<h1>NeuroLearn AI</h1>

<p class="tagline">
Future Learning Starts Here 🚀
</p>

<div class="ai-card">
<h3>AI Insights</h3>
<p>
Personalized recommendations powered by intelligent analytics.
</p>
</div>

<div class="floating-circle one"></div>
<div class="floating-circle two"></div>

</div>

<div class="right-panel">

<div class="glass-card">

<h2 id="formTitle">Login</h2>

<p class="sub-text">
Access your futuristic learning dashboard
</p>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()" class="main-btn">
Enter Platform
</button>

<p id="error"></p>

<div class="switch-box">
<p>
Don't have an account?
<span onclick="toggleForm()">Register</span>
</p>
</div>

</div>

</div>

</div>

<script src="app.js"></script>

<script>

particlesJS("particles-js", {
particles: {
number: {
value: 80
},
size: {
value: 3
},
move: {
speed: 2
},
line_linked: {
enable: true
},
color: {
value: "#7c3aed"
}
}
});

</script>

</body>
</html>
